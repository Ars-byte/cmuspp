name: Release CMUS++

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    name: Build Linux Binary
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libsndfile1-dev libasound2-dev libpng-dev libjpeg-dev

      - name: Build Release Binary
        run: |
          chmod +x bootstrap.sh
          ./bootstrap.sh
      
      - name: Create Tarball
        run: |
          tar -czvf cmuspp-linux.tar.gz cmuspp themes/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: cmuspp-linux.tar.gz
          name: CMUS++ ${{ github.ref_name }}
          body: |
            ### CMUS++ Actualizado
            Binario ejecutable para Linux.            
            
            **Instrucciones de uso:**
            1. Descomprimir: `tar -xzvf cmuspp-linux.tar.gz`
            2. Ejecutar: `./cmuspp`
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
